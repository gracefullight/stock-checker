name: Daily stock data

permissions:
  contents: write

on:
  schedule:
    - cron: "0 23 * * *" # Run ~2 hours after U.S. market close
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run prediction
        run: bun src/index.ts predict --ticker="ABCL,BE,CIEN,DLO,DNA,GEV,GLW,GOOGL,INTC,IONQ,OPEN,PLTR,POET,TSLA,UPST" --sort=asc
        working-directory: packages/core
        env:
          # OHLCV fallback when Yahoo is rate-limited (see services/tiingo.ts)
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      - name: Pull latest changes before commit
        # --autostash: the predict step leaves updated CSVs unstaged, which a
        # plain pull --rebase refuses to run on.
        run: git pull --rebase --autostash origin main
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: daily stock data update"
          file_pattern: "packages/core/public/*.csv"
